<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> shell we go on Movie Proposal ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#ffe6f0;
    text-align:center;
    overflow:hidden;
}

.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

h1{
    color:#ff2d75;
    margin-bottom:20px;
}

#randomPhoto{
    width:280px;
    max-width:80%;
    border-radius:20px;
    margin:20px 0;
    transition:0.4s;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.buttons{
    position:relative;
    width:100%;
    height:180px;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:20px;
    transition:.3s;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#ff4d4d;
    color:white;
    position:absolute;
    left:60%;
    top:20px;
}

#dateScreen{
    display:none;
}

input[type="date"]{
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-top:20px;
}

#confetti{
    position:fixed;
    inset:0;
    pointer-events:none;
}
</style>

</head>

<body>

<canvas id="confetti"></canvas>

<div class="container" id="mainScreen">

```
<img src="photo1.jpg" alt="photo">

<h1 id="question">
    Will You Go On A Movie together With Me? ❤️
</h1>
    
<img id="randomPhoto" src="photo1.jpg" alt="Movie Photo">

<div class="buttons">
    <button id="yesBtn">YES ❤️</button>
    <button id="noBtn">NO 😢</button>
</div>
```

</div>

<div class="container" id="dateScreen">

```
<img src="photo2.jpg" alt="photo">

<h1>YAYYYYY!!! 🥰❤️</h1>

<h2>Pick our date!</h2>

<input type="date" id="datePicker">

<br><br>

<button onclick="confirmDate()">
    Confirm Date 💕
</button>
```

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const question = document.getElementById("question");

const messages = [
"Come on, it'll be fun 🍿",
"Are you sure? 🥺",
"Free popcorn maybe? 🍿😋",
"One movie won't hurt 😅",
"Marvel? Comedy? Your choice 🎬",
"Think again 😭",
"Please? 🥹",
"The YES button looks better ❤️"
];

let count = 0;
let yesSize = 20;

function moveButton(const photo =
document.getElementById("randomPhoto");

const randomIndex =
Math.floor(Math.random() * photos.length);

photo.src = photos[randomIndex];) {

    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const maxX = window.innerWidth - btnWidth - 20;
    const maxY = window.innerHeight - btnHeight - 20;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

yesBtn.addEventListener("click", () => {

    document.getElementById("mainScreen").style.display="none";
    document.getElementById("dateScreen").style.display="flex";

    startConfetti();
});

function confirmDate(){

    const date =
    document.getElementById("datePicker").value;

    if(!date){
        alert("Pick a date first ❤️");
        return;
    }

    alert(
      "It's a movie date! ❤️\n\n" +
      "Selected Date: " + date
    );
}

function startConfetti(){

const canvas =
document.getElementById("confetti");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const pieces = [];

for(let i=0;i<150;i++){

pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*8+2,
d:Math.random()*150
});

}

function draw(){

ctx.clearRect(
0,0,
canvas.width,
canvas.height
);

for(let i=0;i<pieces.length;i++){

const p = pieces[i];

ctx.beginPath();

ctx.arc(
p.x,
p.y,
p.r,
0,
Math.PI*2
);

ctx.fillStyle =
`hsl(${Math.random()*360},
100%,60%)`;

ctx.fill();

p.y += 3;

if(p.y > canvas.height){
p.y = -10;
}

}

requestAnimationFrame(draw);

}

draw();

}

</script>

</body>
</html>
