<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Proposal ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#ffe6f0;
    text-align:center;
    overflow:hidden;
}

.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

h1{
    color:#ff2d75;
    margin-bottom:20px;
}

h2{
    color:#555;
    margin-bottom:20px;
}

#randomPhoto{
    width:280px;
    height:280px;
    object-fit:cover;
    border-radius:20px;
    margin:20px 0;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.buttons{
    position:relative;
    width:100%;
    height:220px;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#ff4d4d;
    color:white;
    position:absolute;
    left:60%;
    top:20px;
}

#movieScreen{
    display:none;
}

input{
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
}

.floatingPhoto{
    position:fixed;
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:15px;
    z-index:999;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="container" id="mainScreen">

```
<h1 id="question">
    Shall We Go To A Movie Together? 🍿🎬
</h1>

<img id="randomPhoto"
     src="photo1.jpg"
     alt="photo">

<div class="buttons">

    <button id="yesBtn">
        YES ❤️
    </button>

    <button id="noBtn">
        NO 😢
    </button>

</div>
```

</div>

<div class="container" id="movieScreen">

```
<h1>YAYYYY!!! 🍿❤️</h1>

<h2>Let's pick a movie day!</h2>

<img src="photo2.jpg"
     style="width:250px;height:250px;
            object-fit:cover;
            border-radius:20px;
            margin-bottom:20px;">

<input type="date" id="datePicker">

<br><br>

<button onclick="confirmMovie()">
    Confirm Movie Night 🎬
</button>
```

</div>

<script>

const photos = [
    "photo1.jpg",
    "photo2.jpg"
];

const messages = [
    "Come on, it'll be fun 🍿",
    "Free popcorn maybe? 😋",
    "Your choice of movie 🎬",
    "Please? 🥺",
    "One movie won't hurt 😅",
    "Think again 😭",
    "Marvel? Comedy? Horror? 🍿",
    "The YES button looks better ❤️"
];

const noBtn =
document.getElementById("noBtn");

const yesBtn =
document.getElementById("yesBtn");

const question =
document.getElementById("question");

const randomPhoto =
document.getElementById("randomPhoto");

let count = 0;
let yesSize = 20;

function moveButton(){

    const btnWidth =
        noBtn.offsetWidth;

    const btnHeight =
        noBtn.offsetHeight;

    const x =
        Math.random() *
        (window.innerWidth - btnWidth - 20);

    const y =
        Math.random() *
        (window.innerHeight - btnHeight - 20);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    question.textContent =
        messages[count % messages.length];

    yesSize += 4;

    yesBtn.style.fontSize =
        yesSize + "px";

    changePhoto();

    spawnPhoto();
    spawnPhoto();

    count++;
}

function changePhoto(){

    const randomIndex =
        Math.floor(
            Math.random() * photos.length
        );

    randomPhoto.src =
        photos[randomIndex];
}

function spawnPhoto(){

    const img =
        document.createElement("img");

    img.className =
        "floatingPhoto";

    img.src =
        photos[
            Math.floor(
                Math.random() * photos.length
            )
        ];

    img.style.left =
        Math.random() *
        (window.innerWidth - 120)
        + "px";

    img.style.top =
        Math.random() *
        (window.innerHeight - 120)
        + "px";

    document.body.appendChild(img);

    setTimeout(() => {
        img.remove();
    }, 2000);
}

noBtn.addEventListener(
    "mouseover",
    moveButton
);

noBtn.addEventListener(
    "click",
    moveButton
);

yesBtn.addEventListener(
    "click",
    () => {

        document.getElementById(
            "mainScreen"
        ).style.display = "none";

        document.getElementById(
            "movieScreen"
        ).style.display = "flex";
    }
);

function confirmMovie(){

    const date =
        document.getElementById(
            "datePicker"
        ).value;

    if(!date){

        alert(
            "Pick a movie day first 🍿"
        );

        return;
    }

    alert(
        "Movie Night Confirmed! ❤️🍿\n\n" +
        "Date: " + date
    );
}

</script>

</body>
</html>
